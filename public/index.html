  <meta charset="UTF-8">

  <link rel="manifest" href="manifest.json">
  <script>
    window.isSpeechRecognitionSupported = function() {
      return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
    };

    window.startSpeechRecognition = function(onStart, onResult, onEnd, onError) {
      try {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          onError("Speech recognition not supported in this browser.");
          return null;
        }
        var recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = function() {
          onStart();
        };
        recognition.onresult = function(event) {
          var results = event.results;
          if (results && results.length > 0) {
            var lastResult = results[results.length - 1];
            if (lastResult && lastResult.length > 0) {
              var transcript = lastResult[0].transcript;
              onResult(transcript);
            }
          }
        };
        recognition.onend = function() {
          onEnd();
        };
        recognition.onerror = function(event) {
          onError(event.error || "Unknown error");
        };

        recognition.start();
        return recognition;
      } catch (e) {
        onError(e.toString());
        return null;
      }
    };

    window.stopSpeechRecognition = function(recognition) {
      if (recognition) {
        try {
          recognition.stop();
        } catch (e) {
          console.error(e);
        }
      }
    };
  </script>
  <!-- Razorpay Standard Checkout Integration -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.openRazorpay = function(key, amount, currency, name, description, orderId, email, contact, onSuccess, onDismiss) {
      var options = {
        "key": key,
        "amount": amount,
        "currency": currency,
        "name": "MediKal Healthcare",
        "description": description,
        "order_id": orderId,
        "handler": function (response) {
          onSuccess(response.razorpay_payment_id, response.razorpay_order_id, response.razorpay_signature);
        },
        "modal": {
          "ondismiss": function() {
            onDismiss();
          }
        },
        "prefill": {
          "name": name,
          "email": email,
          "contact": contact
        },
        "theme": {
          "color": "#0F766E"
        }
      };
      var rzp = new Razorpay(options);
      rzp.open();
    };
  </script>

</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
