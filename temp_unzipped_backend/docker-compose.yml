version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=medikal
      - POSTGRES_USER=medikal_user
      - POSTGRES_PASSWORD=medikal_secure_pass
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  static_volume:
  media_volume:
